<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENCIA DN | Acceso Denegado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between font-sans">
<header class="bg-blue-700 shadow-xl px-6 py-4 rounded-b-2xl flex items-center gap-3">
    <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4.5 16.5c-1.5 1.26-2.5 3.19-2.5 5.5s3.5 .5 5.5-2.5M12 2C6.5 2 2 6.5 2 12c0 3.58 2.5 6.58 6 7l4-4 4 4c3.5-.42 6-3.42 6-7 0-5.5-4.5-10-10-10zM14 8a2 2 0 1 0-4 0 2 2 0 0 0 4 0z" /></svg>
    <h1 class="text-md font-bold tracking-wider text-white">AGENCIA DN | <span class="font-light text-blue-200">DN-GESTOR</span></h1>
</header>
<main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-red-950/40 rounded-3xl p-8 shadow-2xl text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-red-500/50 to-transparent"></div>
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-red-500/10 text-red-400 mb-6 border border-red-500/20">
            <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" /></svg>
        </div>
        <h2 class="text-2xl font-black text-white mb-2 tracking-tight">Acceso Denegado</h2>
        <p class="text-red-400 text-sm" th:text="${mensaje}">Error: No se pudo validar al colaborador.</p>
    </div>
</main>
<footer class="p-6 text-center"><button onclick="window.close()" class="w-full max-w-md bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-red-600/10">Cerrar Pestaña</button></footer>
</body>
</html>
